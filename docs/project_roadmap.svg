<svg width="100%" viewBox="0 0 680 560" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>SQL data analytics project — roadmap</title>
  <desc>Four-phase roadmap: Foundation initialises the database, Exploration covers scripts 01–03, Analysis covers scripts 04–11, Reporting produces two final reports.</desc>
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
      .th { font-size: 14px; font-weight: 600; }
      .ts { font-size: 12px; font-weight: 400; fill: #555; }
      .box-amber rect { fill: #FEF3C7; stroke: #BA7517; }
      .box-teal rect  { fill: #D1FAE5; stroke: #1D9E75; }
      .box-purple rect { fill: #EDE9FE; stroke: #7F77DD; }
      .box-coral rect  { fill: #FFEDD5; stroke: #D85A30; }
      .box-amber text, .box-teal text, .box-purple text, .box-coral text { fill: #1a1a1a; font-size: 13px; font-weight: 500; }
      .arr { stroke: #888; stroke-width: 1.5; fill: none; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="th" x="340" y="28" text-anchor="middle" style="font-size:15px;font-weight:700;fill:#111;">SQL data analytics project — roadmap</text>

  <!-- Phase 1 -->
  <text class="ts" x="340" y="52" text-anchor="middle">Phase 1 · Foundation</text>
  <rect x="35" y="59" width="610" height="60" rx="10" fill="none" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="4 3"/>
  <g class="box-amber">
    <rect x="240" y="69" width="200" height="40" rx="6" stroke-width="0.5"/>
    <text x="340" y="89" text-anchor="middle" dominant-baseline="central">00 · Init database</text>
  </g>

  <line x1="340" y1="119" x2="340" y2="159" class="arr" marker-end="url(#arrow)"/>

  <!-- Phase 2 -->
  <text class="ts" x="340" y="172" text-anchor="middle">Phase 2 · Exploration</text>
  <rect x="35" y="179" width="610" height="60" rx="10" fill="none" stroke="#1D9E75" stroke-width="0.5" stroke-dasharray="4 3"/>
  <g class="box-teal">
    <rect x="50" y="189" width="186" height="40" rx="6" stroke-width="0.5"/>
    <text x="143" y="209" text-anchor="middle" dominant-baseline="central">01 · DB exploration</text>
  </g>
  <g class="box-teal">
    <rect x="247" y="189" width="186" height="40" rx="6" stroke-width="0.5"/>
    <text x="340" y="209" text-anchor="middle" dominant-baseline="central">02 · Dimensions</text>
  </g>
  <g class="box-teal">
    <rect x="444" y="189" width="186" height="40" rx="6" stroke-width="0.5"/>
    <text x="537" y="209" text-anchor="middle" dominant-baseline="central">03 · Date ranges</text>
  </g>

  <line x1="340" y1="239" x2="340" y2="279" class="arr" marker-end="url(#arrow)"/>

  <!-- Phase 3 -->
  <text class="ts" x="340" y="292" text-anchor="middle">Phase 3 · Analysis</text>
  <rect x="35" y="299" width="610" height="120" rx="10" fill="none" stroke="#7F77DD" stroke-width="0.5" stroke-dasharray="4 3"/>
  <g class="box-purple">
    <rect x="45" y="309" width="141" height="40" rx="6" stroke-width="0.5"/>
    <text x="115" y="329" text-anchor="middle" dominant-baseline="central">04 · Measures</text>
  </g>
  <g class="box-purple">
    <rect x="194" y="309" width="141" height="40" rx="6" stroke-width="0.5"/>
    <text x="264" y="329" text-anchor="middle" dominant-baseline="central">05 · Magnitude</text>
  </g>
  <g class="box-purple">
    <rect x="343" y="309" width="141" height="40" rx="6" stroke-width="0.5"/>
    <text x="413" y="329" text-anchor="middle" dominant-baseline="central">06 · Ranking</text>
  </g>
  <g class="box-purple">
    <rect x="492" y="309" width="141" height="40" rx="6" stroke-width="0.5"/>
    <text x="562" y="329" text-anchor="middle" dominant-baseline="central">07 · Trends</text>
  </g>
  <g class="box-purple">
    <rect x="45" y="361" width="141" height="40" rx="6" stroke-width="0.5"/>
    <text x="115" y="381" text-anchor="middle" dominant-baseline="central">08 · Cumulative</text>
  </g>
  <g class="box-purple">
    <rect x="194" y="361" width="141" height="40" rx="6" stroke-width="0.5"/>
    <text x="264" y="381" text-anchor="middle" dominant-baseline="central">09 · Performance</text>
  </g>
  <g class="box-purple">
    <rect x="343" y="361" width="141" height="40" rx="6" stroke-width="0.5"/>
    <text x="413" y="381" text-anchor="middle" dominant-baseline="central">10 · Segmentation</text>
  </g>
  <g class="box-purple">
    <rect x="492" y="361" width="141" height="40" rx="6" stroke-width="0.5"/>
    <text x="562" y="381" text-anchor="middle" dominant-baseline="central">11 · Part-to-whole</text>
  </g>

  <line x1="340" y1="419" x2="340" y2="459" class="arr" marker-end="url(#arrow)"/>

  <!-- Phase 4 -->
  <text class="ts" x="340" y="472" text-anchor="middle">Phase 4 · Reporting</text>
  <rect x="35" y="479" width="610" height="60" rx="10" fill="none" stroke="#D85A30" stroke-width="0.5" stroke-dasharray="4 3"/>
  <g class="box-coral">
    <rect x="45" y="489" width="289" height="40" rx="6" stroke-width="0.5"/>
    <text x="189" y="509" text-anchor="middle" dominant-baseline="central">12 · Customer report</text>
  </g>
  <g class="box-coral">
    <rect x="344" y="489" width="289" height="40" rx="6" stroke-width="0.5"/>
    <text x="488" y="509" text-anchor="middle" dominant-baseline="central">13 · Product report</text>
  </g>
</svg>
